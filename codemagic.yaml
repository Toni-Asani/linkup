workflows:
  ios-distribution:
    name: Hubbing iOS Distribution
    max_build_duration: 60

    environment:
      groups:
        - ios
      ios_signing:
        distribution_type: app_store
        bundle_identifier: ch.hubbing.app

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Build web assets
        script: |
          npm run build

      - name: Capacitor sync
        script: |
          npx cap copy ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install

      - name: Build IPA
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "App"

    artifacts:
      - build/ios/ipa/*.ipa