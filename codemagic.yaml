workflows:
  android-distribution:
    name: Hubbing Android Distribution
    max_build_duration: 60

    environment:
      java: 21
      android_signing:
        - HubbingAndroidUpload
      vars:
        PACKAGE_NAME: "ch.hubbing.app"
        REACT_APP_SUPABASE_URL: "https://rxjrcbdeyouafhtizneh.supabase.co"
        REACT_APP_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ4anJjYmRleW91YWZodGl6bmVoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1Mjk1MjIsImV4cCI6MjA4OTEwNTUyMn0.yDgjAGZK3g-GR4GvlM-JOh2rfsYXRIW-_RwLt9lfi70"

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Build web assets
        script: |
          GENERATE_SOURCEMAP=false npm run build

      - name: Capacitor sync
        script: |
          npx cap sync android

      - name: Build Android app bundle
        script: |
          cd android
          ./gradlew bundleRelease

    artifacts:
      - android/app/build/outputs/**/*.aab

  ios-distribution:
    name: Hubbing iOS Distribution
    max_build_duration: 60

    environment:
      groups:
        - iOS
      ios_signing:
        distribution_type: app_store
        bundle_identifier: ch.hubbing.app

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Build web assets
        script: |
          GENERATE_SOURCEMAP=false npm run build

      - name: Capacitor sync
        script: |
          npx cap copy ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install

      - name: Build IPA
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "App"

    artifacts:
      - build/ios/ipa/*.ipa
